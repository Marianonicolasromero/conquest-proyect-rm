<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>RM Conquest Proyect</title>
  <meta name="description" content="Gestión financiera profesional de negocios y cuentas personales — RM Conquest Proyect.">
  <meta name="theme-color" content="#07070a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RM Conquest">
  <link rel="apple-touch-icon" href="app_icon.png">
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ========== TOP NAVIGATION ========== -->
  <header id="top-nav">
    <div class="nav-logo">
      <div class="logo-box">
        <!-- Mini chart icon -->
        <svg class="logo-icon" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Bar chart bars -->
          <rect x="3" y="15" width="4" height="8" rx="1" fill="currentColor" opacity="0.6"/>
          <rect x="9" y="10" width="4" height="13" rx="1" fill="currentColor" opacity="0.8"/>
          <rect x="15" y="6" width="4" height="17" rx="1" fill="currentColor"/>
          <!-- Trend arrow -->
          <path d="M19 4 L23 1 M23 1 L23 5 M23 1 L19 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="logo-badge">
          <span class="logo-rm">RM</span>
          <span class="logo-text">Conquest Proyect</span>
        </div>
      </div>
    </div>

    <nav class="nav-links" id="main-nav">
      <button class="nav-link active" data-view="general">General</button>

      <div class="nav-dropdown-wrap" id="dropdown-wrap-negocio">
        <button class="nav-link has-dropdown" data-view="negocio" id="nav-negocio">
          <span id="nav-negocio-label">Negocio</span>
          <svg class="dropdown-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="nav-dropdown-menu" id="dropdown-negocio"><!-- JS --></div>
      </div>

      <div class="nav-dropdown-wrap" id="dropdown-wrap-personal">
        <button class="nav-link has-dropdown" data-view="personal" id="nav-personal">
          <span id="nav-personal-label">Personal</span>
          <svg class="dropdown-chevron" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="nav-dropdown-menu" id="dropdown-personal"><!-- JS --></div>
      </div>

      <button class="nav-link" data-view="analisis">Análisis</button>
      <button class="nav-link" data-view="metas">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Metas
      </button>
    </nav>

    <button id="btn-settings-header" class="btn-theme" title="Ajustes" aria-label="Ajustes">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
      <span class="btn-theme-label">Ajustes</span>
    </button>

    <button id="btn-theme" class="btn-theme" title="Cambiar tema" aria-label="Cambiar tema">
      <!-- Moon icon (dark mode active) -->
      <svg id="theme-icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
      <!-- Sun icon (light mode active) -->
      <svg id="theme-icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <span class="btn-theme-label" id="theme-label">Claro</span>
    </button>

    <button id="btn-new-transaction" class="btn btn-primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span>Nuevo</span>
    </button>
  </header>

  <!-- ========== STATS TICKER ========== -->
  <div id="stats-ticker"><!-- JS --></div>

  <!-- ========== MAIN CONTENT ========== -->
  <main id="main-content"><!-- JS --></main>

  <!-- ========== TRANSACTION MODAL ========== -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-labelledby="modal-title">
      <div class="modal-header">
        <h3 id="modal-title">Nuevo Movimiento</h3>
        <button id="btn-close-modal" class="btn-icon" aria-label="Cerrar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="transaction-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label">Tipo</label>
          <div class="toggle-group" id="toggle-type">
            <button type="button" class="toggle-btn active" data-value="ingreso">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
              Ingreso
            </button>
            <button type="button" class="toggle-btn" data-value="gasto">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
              Gasto
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-amount">Monto</label>
          <input type="number" id="field-amount" class="form-input" placeholder="0.00" min="0" step="0.01" required>
        </div>
        <div class="form-row">
          <div class="form-group flex-1">
            <label class="form-label">Moneda</label>
            <div class="toggle-group" id="toggle-currency">
              <button type="button" class="toggle-btn active" data-value="ARS">ARS</button>
              <button type="button" class="toggle-btn" data-value="USD">USD</button>
            </div>
          </div>
          <div class="form-group flex-1">
            <label class="form-label">Medio</label>
            <div class="toggle-group" id="toggle-medium">
              <button type="button" class="toggle-btn active" data-value="efectivo">Efectivo</button>
              <button type="button" class="toggle-btn" data-value="virtual">Virtual</button>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">Ámbito</label>
          <div class="toggle-group" id="toggle-scope">
            <button type="button" class="toggle-btn active" data-value="negocio">Negocio</button>
            <button type="button" class="toggle-btn" data-value="personal">Personal</button>
          </div>
        </div>
        <div class="form-group" id="group-entity-select">
          <label class="form-label" id="label-entity-select">Cuenta / Negocio</label>
          <div class="toggle-group" id="toggle-entity"><!-- JS --></div>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-category">Categoría</label>
          <select id="field-category" class="form-select" required></select>
        </div>
        <div class="form-group">
          <label class="form-label" for="field-description">Descripción <span class="optional">(opcional)</span></label>
          <input type="text" id="field-description" class="form-input" placeholder="Detalle del movimiento...">
        </div>
        <div class="form-group">
          <label class="form-label" for="field-date">Fecha</label>
          <input type="date" id="field-date" class="form-input" required>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel-modal" class="btn btn-secondary">Cancelar</button>
          <button type="submit" id="btn-save-transaction" class="btn btn-primary">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== GOAL MODAL ========== -->
  <div id="goal-modal-overlay" class="modal-overlay hidden">
    <div class="modal" role="dialog" aria-labelledby="goal-modal-title">
      <div class="modal-header">
        <h3 id="goal-modal-title">Nueva Meta</h3>
        <button id="btn-close-goal-modal" class="btn-icon" aria-label="Cerrar">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <form id="goal-form" autocomplete="off">
        <div style="padding: 20px 24px 0;">
          <div class="form-group">
            <label class="form-label">Tipo de Meta</label>
            <div class="toggle-group" id="goal-toggle-type">
              <button type="button" class="toggle-btn active" data-value="gasto">Tope de Gasto</button>
              <button type="button" class="toggle-btn" data-value="ingreso">Meta de Ingreso</button>
            </div>
          </div>
          <div class="goal-modal-grid">
            <div class="form-group">
              <label class="form-label">Ámbito</label>
              <div class="toggle-group" id="goal-toggle-scope">
                <button type="button" class="toggle-btn active" data-value="negocio">Negocio</button>
                <button type="button" class="toggle-btn" data-value="personal">Personal</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Cuenta</label>
              <select id="goal-entity-select" class="form-select"></select>
            </div>
          </div>
          <div class="goal-modal-grid">
            <div class="form-group">
              <label class="form-label">Categoría</label>
              <select id="goal-category-select" class="form-select"></select>
            </div>
            <div class="form-group">
              <label class="form-label">Moneda</label>
              <div class="toggle-group" id="goal-toggle-currency">
                <button type="button" class="toggle-btn active" data-value="ARS">ARS</button>
                <button type="button" class="toggle-btn" data-value="USD">USD</button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <label class="form-label" for="goal-amount">Monto mensual</label>
            <input type="number" id="goal-amount" class="form-input" placeholder="0.00" min="0" step="0.01" required>
          </div>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel-goal-modal" class="btn btn-secondary">Cancelar</button>
          <button type="submit" id="btn-save-goal" class="btn btn-primary">Guardar Meta</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ========== CONFIRM DIALOG ========== -->
  <div id="confirm-overlay" class="modal-overlay hidden">
    <div class="modal modal-sm">
      <p id="confirm-message" class="confirm-text">¿Estás seguro de que querés eliminar este movimiento?</p>
      <div class="modal-actions">
        <button id="btn-confirm-no" class="btn btn-secondary">Cancelar</button>
        <button id="btn-confirm-yes" class="btn btn-danger">Eliminar</button>
      </div>
    </div>
  </div>

  <!-- ========== BACKGROUND WATERMARK ========== -->
  <div id="bg-watermark" aria-hidden="true">
    <svg viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- RM large monogram outline -->
      <text x="20" y="300" font-family="Inter, system-ui, sans-serif" font-size="280" font-weight="800"
            fill="none" stroke="currentColor" stroke-width="6" letter-spacing="-20"
            opacity="1">RM</text>
      <!-- Decorative grid lines -->
      <line x1="0" y1="60"  x2="420" y2="60"  stroke="currentColor" stroke-width="1" opacity="0.4"/>
      <line x1="0" y1="120" x2="420" y2="120" stroke="currentColor" stroke-width="1" opacity="0.3"/>
      <line x1="0" y1="180" x2="420" y2="180" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      <line x1="0" y1="240" x2="420" y2="240" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      <line x1="0" y1="300" x2="420" y2="300" stroke="currentColor" stroke-width="1" opacity="0.2"/>
      <line x1="0" y1="360" x2="420" y2="360" stroke="currentColor" stroke-width="1" opacity="0.3"/>
      <!-- Diagonal accent -->
      <line x1="0" y1="420" x2="420" y2="0" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
      <!-- Trend arrow big -->
      <polyline points="60,380 160,260 230,310 340,140" stroke="currentColor" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6"/>
      <circle cx="340" cy="140" r="6" fill="currentColor" opacity="0.6"/>
    </svg>
  </div>

  <!-- ========== MOBILE BOTTOM NAV ========== -->
  <nav id="bottom-nav" aria-label="Navegación principal móvil">
    <button class="bottom-nav-btn active" data-view="general" id="bnav-general">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
      </svg>
      <span>General</span>
    </button>

    <button class="bottom-nav-btn" data-view="negocio" id="bnav-negocio">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Negocio</span>
    </button>

    <!-- FAB placeholder slot -->
    <div class="bottom-nav-fab-slot" aria-hidden="true"></div>

    <button class="bottom-nav-btn" data-view="personal" id="bnav-personal">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Personal</span>
    </button>

    <button class="bottom-nav-btn" data-view="metas" id="bnav-metas">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>Metas</span>
    </button>
  </nav>

  <!-- FAB: Nueva Transacción (mobile) -->
  <button id="btn-fab" aria-label="Nueva transacción" title="Nueva transacción">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
  </button>

  <input type="file" id="file-import" accept=".json" style="display:none">
  <script src="charts.js"></script>
  <script src="app.js"></script>
</body>
</html>
